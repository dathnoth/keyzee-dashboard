<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyzee Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #f0c040;
    --accent2: #4ade80;
    --accent-dim: rgba(240,192,64,0.12);
    --text: #f0ede8;
    --muted: #6b6b78;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  .dashboard {
    width: 100%;
    max-width: 860px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 40px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .brand-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  /* Login panel */
  #login-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  #login-panel h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  #login-panel p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: -12px;
  }

  .field-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus { border-color: var(--accent); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-top: 2px;
  }

  .btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 6px;
    padding: 12px 24px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.1s;
    align-self: flex-start;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Dashboard panel */
  #dashboard-panel { display: none; flex-direction: column; gap: 32px; }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .date-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }

  .date-input-wrap span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .date-input-wrap input {
    background: transparent;
    border: none;
    padding: 0;
    font-size: 13px;
    width: 130px;
  }

  .presets {
    display: flex;
    gap: 6px;
  }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }

  .preset-btn:hover, .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .fetch-btn {
    margin-left: auto;
    padding: 9px 18px;
    font-size: 13px;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .kpi-card.loaded::before { opacity: 1; }

  .kpi-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .kpi-value {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    min-height: 52px;
    display: flex;
    align-items: center;
  }

  .kpi-value.loading {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    width: 60%;
    height: 52px;
    color: transparent;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .kpi-meta {
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .kpi-meta .up { color: var(--accent2); }
  .kpi-meta .down { color: #f87171; }

  .kpi-orders {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* Error */
  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: #f87171;
    display: none;
  }

  .logout-link {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    padding: 0;
  }

  .logout-link:hover { color: var(--text); }

  .last-updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  footer {
    margin-top: 48px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="dashboard">

  <header>
    <div class="brand">
      <span class="brand-label">Sales Dashboard</span>
      <span class="brand-name">Keyzee</span>
    </div>
    <button class="logout-link" id="logout-btn" style="display:none">disconnect</button>
  </header>

  <!-- Login -->
  <div id="login-panel">
    <div>
      <h2>Connect to Odoo</h2>
      <p>Credentials stored in your browser only.</p>
    </div>
    <div class="field-group">
      <div class="field">
        <label>Database</label>
        <input type="text" id="db" value="keyzee" placeholder="keyzee">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="email" id="username" placeholder="you@keyzee.com">
      </div>
      <div class="field full">
        <label>API Key</label>
        <input type="password" id="apikey" placeholder="Your Odoo API key">
        <span class="hint">Settings → Technical → API Keys</span>
      </div>
    </div>
    <div id="login-error" class="error-msg"></div>
    <button class="btn" id="connect-btn" onclick="connect()">Connect</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard-panel">
    <div class="controls">
      <div class="date-input-wrap">
        <span>From</span>
        <input type="date" id="date-from">
      </div>
      <div class="date-input-wrap">
        <span>To</span>
        <input type="date" id="date-to">
      </div>
      <div class="presets">
        <button class="preset-btn" onclick="setPreset(7)">7D</button>
        <button class="preset-btn active" onclick="setPreset(30)">30D</button>
        <button class="preset-btn" onclick="setPreset(90)">90D</button>
        <button class="preset-btn" onclick="setPreset(365)">1Y</button>
      </div>
      <button class="btn fetch-btn" onclick="fetchData()">Refresh</button>
    </div>

    <div id="dash-error" class="error-msg"></div>

    <div class="kpi-grid">
      <div class="kpi-card" id="card-revenue">
        <div class="kpi-label">Revenue (excl. tax)</div>
        <div class="kpi-value loading" id="val-revenue">—</div>
        <div class="kpi-meta" id="meta-revenue"></div>
        <div class="kpi-orders" id="orders-count"></div>
      </div>
      <div class="kpi-card" id="card-aov">
        <div class="kpi-label">Avg. Order Value</div>
        <div class="kpi-value loading" id="val-aov">—</div>
        <div class="kpi-meta" id="meta-aov"></div>
      </div>
    </div>

    <span class="last-updated" id="last-updated"></span>
  </div>

</div>

<footer>DT Digital · Keyzee Dashboard</footer>

<script>
const ODOO_URL = 'https://keyzee.odoo.com';
let creds = null;

function fmt(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + n.toFixed(2);
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function setPreset(days) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('date-to').value = fmtDate(to);
  document.getElementById('date-from').value = fmtDate(from);
  fetchData();
}

function defaultDates() {
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('date-to').value = fmtDate(to);
  document.getElementById('date-from').value = fmtDate(from);
}

async function rpc(model, method, args, kwargs) {
  const resp = await fetch(`${ODOO_URL}/web/dataset/call_kw`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0', method: 'call', id: 1,
      params: {
        model, method,
        args: args || [],
        kwargs: {
          context: {},
          ...kwargs
        }
      }
    }),
    credentials: 'include'
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.data?.message || data.error.message);
  return data.result;
}

async function authenticate() {
  const resp = await fetch(`${ODOO_URL}/web/session/authenticate`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      jsonrpc: '2.0', method: 'call', id: 1,
      params: {
        db: creds.db,
        login: creds.username,
        password: creds.apikey
      }
    }),
    credentials: 'include'
  });
  const data = await resp.json();
  if (!data.result?.uid) throw new Error('Authentication failed. Check your credentials.');
  return data.result.uid;
}

async function connect() {
  const btn = document.getElementById('connect-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Connecting…';

  creds = {
    db: document.getElementById('db').value.trim(),
    username: document.getElementById('username').value.trim(),
    apikey: document.getElementById('apikey').value.trim()
  };

  try {
    await authenticate();
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('dashboard-panel').style.display = 'flex';
    document.getElementById('logout-btn').style.display = 'block';
    defaultDates();
    await fetchData();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Connect';
  }
}

function setLoading() {
  ['val-revenue','val-aov'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.add('loading');
  });
  document.getElementById('meta-revenue').textContent = '';
  document.getElementById('meta-aov').textContent = '';
  document.getElementById('orders-count').textContent = '';
  document.getElementById('card-revenue').classList.remove('loaded');
  document.getElementById('card-aov').classList.remove('loaded');
}

async function fetchData() {
  const errEl = document.getElementById('dash-error');
  errEl.style.display = 'none';
  setLoading();

  const dateFrom = document.getElementById('date-from').value;
  const dateTo = document.getElementById('date-to').value;

  const domain = [
    ['state', 'in', ['sale', 'done']],
    ['date_order', '>=', dateFrom + ' 00:00:00'],
    ['date_order', '<=', dateTo + ' 23:59:59']
  ];

  // Previous period for comparison
  const days = Math.round((new Date(dateTo) - new Date(dateFrom)) / 86400000);
  const prevTo = new Date(dateFrom);
  prevTo.setDate(prevTo.getDate() - 1);
  const prevFrom = new Date(prevTo);
  prevFrom.setDate(prevFrom.getDate() - days);

  const prevDomain = [
    ['state', 'in', ['sale', 'done']],
    ['date_order', '>=', fmtDate(prevFrom) + ' 00:00:00'],
    ['date_order', '<=', fmtDate(prevTo) + ' 23:59:59']
  ];

  try {
    const [current, previous] = await Promise.all([
      rpc('sale.order', 'search_read', [domain], {
        fields: ['amount_untaxed'],
        limit: 0
      }),
      rpc('sale.order', 'search_read', [prevDomain], {
        fields: ['amount_untaxed'],
        limit: 0
      })
    ]);

    const revenue = current.reduce((s, o) => s + o.amount_untaxed, 0);
    const count = current.length;
    const aov = count > 0 ? revenue / count : 0;

    const prevRevenue = previous.reduce((s, o) => s + o.amount_untaxed, 0);
    const prevCount = previous.length;
    const prevAov = prevCount > 0 ? prevRevenue / prevCount : 0;

    function pctChange(curr, prev) {
      if (prev === 0) return null;
      return ((curr - prev) / prev * 100).toFixed(1);
    }

    function renderChange(pct) {
      if (pct === null) return '<span>No prior data</span>';
      const cls = pct >= 0 ? 'up' : 'down';
      const arrow = pct >= 0 ? '↑' : '↓';
      return `<span class="${cls}">${arrow} ${Math.abs(pct)}%</span> vs prior period`;
    }

    const revPct = pctChange(revenue, prevRevenue);
    const aovPct = pctChange(aov, prevAov);

    // Render
    const revEl = document.getElementById('val-revenue');
    revEl.classList.remove('loading');
    revEl.textContent = fmt(revenue);

    const aovEl = document.getElementById('val-aov');
    aovEl.classList.remove('loading');
    aovEl.textContent = fmt(aov);

    document.getElementById('meta-revenue').innerHTML = renderChange(revPct);
    document.getElementById('meta-aov').innerHTML = renderChange(aovPct);
    document.getElementById('orders-count').textContent = `${count} order${count !== 1 ? 's' : ''}`;

    document.getElementById('card-revenue').classList.add('loaded');
    document.getElementById('card-aov').classList.add('loaded');

    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();

  } catch(e) {
    errEl.textContent = 'Error fetching data: ' + e.message;
    errEl.style.display = 'block';
    ['val-revenue','val-aov'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('loading');
      el.textContent = '—';
    });
  }
}

document.getElementById('logout-btn').addEventListener('click', () => {
  creds = null;
  document.getElementById('dashboard-panel').style.display = 'none';
  document.getElementById('login-panel').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
});

// Allow Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-panel').style.display !== 'none') {
    connect();
  }
});
</script>
<!-- ends here -->
</body>
</html>
