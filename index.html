<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyzee Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #f0c040;
    --accent2: #4ade80;
    --accent-dim: rgba(240,192,64,0.12);
    --text: #f0ede8;
    --muted: #6b6b78;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  .dashboard {
    width: 100%;
    max-width: 960px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 40px;
  }

  .brand { display: flex; flex-direction: column; gap: 4px; }

  .brand-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .date-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
  }

  .date-input-wrap span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .date-input-wrap input {
    background: transparent;
    border: none;
    padding: 0;
    font-size: 13px;
    width: 130px;
    color: var(--text);
    font-family: var(--mono);
    outline: none;
  }

  .presets { display: flex; gap: 6px; }

  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }

  .preset-btn:hover, .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 6px;
    padding: 9px 18px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.2s, transform 0.1s;
    margin-left: auto;
  }

  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }

  /* Grids */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .kpi-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  /* Cards */
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .kpi-card.loaded::before { opacity: 1; }

  .kpi-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Single-value cards */
  .kpi-value {
    font-family: var(--mono);
    font-size: 42px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    min-height: 46px;
    display: flex;
    align-items: center;
  }

  .kpi-value.loading {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    width: 60%;
    height: 46px;
    color: transparent;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .kpi-meta {
    margin-top: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .kpi-meta .up { color: var(--accent2); }
  .kpi-meta .down { color: #f87171; }

  .kpi-sub {
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* Fulfillment suffix */
  .kpi-suffix {
    font-size: 18px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 6px;
    letter-spacing: 0;
  }

  /* Breakdown cards */
  .kpi-breakdown {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .kpi-breakdown.loading {
    opacity: 0.3;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.15; }
  }

  .breakdown-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .breakdown-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .breakdown-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  /* Error */
  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: #f87171;
    display: none;
    margin-bottom: 24px;
  }

  .last-updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
    display: block;
  }

  footer {
    margin-top: 48px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="dashboard">

  <header>
    <div class="brand">
      <span class="brand-label">Sales Dashboard</span>
      <span class="brand-name">Keyzee</span>
    </div>
  </header>

  <div class="controls">
    <div class="date-input-wrap">
      <span>From</span>
      <input type="date" id="date-from">
    </div>
    <div class="date-input-wrap">
      <span>To</span>
      <input type="date" id="date-to">
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="setPreset(7)">7D</button>
      <button class="preset-btn active" onclick="setPreset(30)">30D</button>
      <button class="preset-btn" onclick="setPreset(90)">90D</button>
      <button class="preset-btn" onclick="setPreset(365)">1Y</button>
    </div>
    <button class="btn" onclick="fetchData()">Refresh</button>
  </div>

  <div id="dash-error" class="error-msg"></div>

  <!-- Row 1: Revenue & AOV -->
  <div class="kpi-grid">
    <div class="kpi-card" id="card-revenue">
      <div class="kpi-label">Revenue (excl. tax)</div>
      <div class="kpi-value loading" id="val-revenue">—</div>
      <div class="kpi-meta" id="meta-revenue"></div>
      <div class="kpi-sub" id="orders-count"></div>
    </div>
    <div class="kpi-card" id="card-aov">
      <div class="kpi-label">Avg. Order Value</div>
      <div class="kpi-value loading" id="val-aov">—</div>
      <div class="kpi-meta" id="meta-aov"></div>
    </div>
  </div>

  <!-- Row 2: Order status counts -->
  <div class="kpi-grid-3">
    <div class="kpi-card" id="card-received">
      <div class="kpi-label">Orders Received</div>
      <div class="kpi-value loading" id="val-received">—</div>
      <div class="kpi-meta" id="meta-received"></div>
    </div>
    <div class="kpi-card" id="card-approved">
      <div class="kpi-label">Orders Approved</div>
      <div class="kpi-value loading" id="val-approved">—</div>
      <div class="kpi-meta" id="meta-approved"></div>
    </div>
    <div class="kpi-card" id="card-completed">
      <div class="kpi-label">Orders Completed</div>
      <div class="kpi-value loading" id="val-completed">—</div>
      <div class="kpi-meta" id="meta-completed"></div>
    </div>
  </div>

  <!-- Row 3: Fulfilment, Items, Order types -->
  <div class="kpi-grid-3">
    <div class="kpi-card" id="card-fulfil">
      <div class="kpi-label">Avg. Fulfilment Time</div>
      <div class="kpi-value loading" id="val-fulfil">—</div>
      <div class="kpi-meta" id="meta-fulfil"></div>
    </div>
    <div class="kpi-card" id="card-items">
      <div class="kpi-label">Items Sent</div>
      <div class="kpi-breakdown loading" id="val-items">
        <div class="breakdown-row">
          <span class="breakdown-label">Keys</span>
          <span class="breakdown-value" id="items-keys">—</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">Fobs</span>
          <span class="breakdown-value" id="items-fobs">—</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">Remotes</span>
          <span class="breakdown-value" id="items-remotes">—</span>
        </div>
      </div>
    </div>
    <div class="kpi-card" id="card-bytype">
      <div class="kpi-label">Orders by Type</div>
      <div class="kpi-breakdown loading" id="val-bytype">
        <div class="breakdown-row">
          <span class="breakdown-label">Agent</span>
          <span class="breakdown-value" id="type-agent">—</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">Owner</span>
          <span class="breakdown-value" id="type-owner">—</span>
        </div>
        <div class="breakdown-row">
          <span class="breakdown-label">Tenant</span>
          <span class="breakdown-value" id="type-tenant">—</span>
        </div>
      </div>
    </div>
  </div>

  <span class="last-updated" id="last-updated"></span>

</div>

<footer>DT Digital · Keyzee Dashboard</footer>

<script>
const WORKER_URL = 'https://keyzee-odoo-proxy.danieltnthompson.workers.dev';

function fmt(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + n.toFixed(2);
}

function fmtDate(d) { return d.toISOString().split('T')[0]; }

function setPreset(days) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('date-to').value = fmtDate(to);
  document.getElementById('date-from').value = fmtDate(from);
  fetchData();
}

function defaultDates() {
  const to = new Date(), from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('date-to').value = fmtDate(to);
  document.getElementById('date-from').value = fmtDate(from);
}

function pctChange(curr, prev) {
  if (prev === 0) return null;
  return ((curr - prev) / prev * 100).toFixed(1);
}

function renderChange(pct) {
  if (pct === null) return '<span>No prior data</span>';
  const cls = pct >= 0 ? 'up' : 'down';
  const arrow = pct >= 0 ? '↑' : '↓';
  return `<span class="${cls}">${arrow} ${Math.abs(pct)}%</span> vs prior period`;
}

function setLoading() {
  // Single-value cards
  ['val-revenue','val-aov','val-received','val-approved','val-completed','val-fulfil'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.add('loading');
  });
  // Clear metas
  ['meta-revenue','meta-aov','meta-received','meta-approved','meta-completed','meta-fulfil','orders-count'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  // Breakdown cards
  document.getElementById('val-items').classList.add('loading');
  document.getElementById('val-bytype').classList.add('loading');
  ['items-keys','items-fobs','items-remotes','type-agent','type-owner','type-tenant'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  // Remove loaded state
  ['card-revenue','card-aov','card-received','card-approved','card-completed','card-fulfil','card-items','card-bytype'].forEach(id => {
    document.getElementById(id).classList.remove('loaded');
  });
}

async function fetchData() {
  const errEl = document.getElementById('dash-error');
  errEl.style.display = 'none';
  setLoading();

  const dateFrom = document.getElementById('date-from').value;
  const dateTo = document.getElementById('date-to').value;

  try {
    const resp = await fetch(`${WORKER_URL}/api/sales?from=${dateFrom}&to=${dateTo}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const { revenue, count, prevRevenue, prevCount,
            ordersReceived, prevOrdersReceived,
            ordersApproved, prevOrdersApproved,
            ordersCompleted, prevOrdersCompleted,
            avgFulfillmentDays, itemsSent, ordersByType } = data;

    const aov = count > 0 ? revenue / count : 0;
    const prevAov = prevCount > 0 ? prevRevenue / prevCount : 0;

    // Row 1
    setVal('val-revenue', fmt(revenue));
    setVal('val-aov', fmt(aov));
    document.getElementById('meta-revenue').innerHTML = renderChange(pctChange(revenue, prevRevenue));
    document.getElementById('meta-aov').innerHTML = renderChange(pctChange(aov, prevAov));
    document.getElementById('orders-count').textContent = `${count} order${count !== 1 ? 's' : ''}`;

    // Row 2
    setVal('val-received', ordersReceived);
    setVal('val-approved', ordersApproved);
    setVal('val-completed', ordersCompleted);
    document.getElementById('meta-received').innerHTML = renderChange(pctChange(ordersReceived, prevOrdersReceived));
    document.getElementById('meta-approved').innerHTML = renderChange(pctChange(ordersApproved, prevOrdersApproved));
    document.getElementById('meta-completed').innerHTML = renderChange(pctChange(ordersCompleted, prevOrdersCompleted));

    // Row 3 — Fulfilment
    if (avgFulfillmentDays !== null && avgFulfillmentDays !== undefined) {
      const el = document.getElementById('val-fulfil');
      el.classList.remove('loading');
      el.innerHTML = `${Math.abs(avgFulfillmentDays).toFixed(1)}<span class="kpi-suffix">days</span>`;
      document.getElementById('meta-fulfil').textContent = avgFulfillmentDays < 0
        ? 'ahead of schedule on avg'
        : 'after scheduled date on avg';
    } else {
      setVal('val-fulfil', 'N/A');
      document.getElementById('meta-fulfil').textContent = 'no delivery data';
    }

    // Row 3 — Items Sent
    document.getElementById('items-keys').textContent = (itemsSent.keys || 0).toLocaleString();
    document.getElementById('items-fobs').textContent = (itemsSent.fobs || 0).toLocaleString();
    document.getElementById('items-remotes').textContent = (itemsSent.remotes || 0).toLocaleString();
    document.getElementById('val-items').classList.remove('loading');

    // Row 3 — Orders by Type
    document.getElementById('type-agent').textContent = (ordersByType.agent || 0).toLocaleString();
    document.getElementById('type-owner').textContent = (ordersByType.owner || 0).toLocaleString();
    document.getElementById('type-tenant').textContent = (ordersByType.tenant || 0).toLocaleString();
    document.getElementById('val-bytype').classList.remove('loading');

    // Mark all loaded
    ['card-revenue','card-aov','card-received','card-approved','card-completed','card-fulfil','card-items','card-bytype'].forEach(id => {
      document.getElementById(id).classList.add('loaded');
    });

    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
    ['val-revenue','val-aov','val-received','val-approved','val-completed','val-fulfil'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('loading');
      el.textContent = '—';
    });
  }
}

function setVal(id, value) {
  const el = document.getElementById(id);
  el.classList.remove('loading');
  el.textContent = value;
}

defaultDates();
fetchData();
</script>
</body>
</html>
